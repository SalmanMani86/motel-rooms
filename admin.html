<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Staff Update</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #f1f5f9;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-bottom: 100px;
    }

    /* ── Fixed top bar ── */
    .topbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      background: #1e3a8a;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      height: 56px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.18);
    }

    .topbar-left {
      display: flex;
      flex-direction: column;
    }

    .topbar-title {
      font-size: 0.95rem;
      font-weight: 700;
      color: #fff;
    }

    .topbar-date {
      font-size: 0.65rem;
      color: rgba(255,255,255,0.55);
      margin-top: 1px;
    }

    .back-btn {
      background: rgba(255,255,255,0.15);
      color: #fff;
      font-size: 0.75rem;
      font-weight: 600;
      border: none;
      border-radius: 20px;
      padding: 7px 14px;
      text-decoration: none;
      transition: background 0.15s;
      white-space: nowrap;
    }

    .back-btn:hover { background: rgba(255,255,255,0.25); }


    /* ── Tip + refresh row ── */
    .tip-row {
      width: calc(100% - 28px);
      max-width: 480px;
      margin: 68px 14px 0;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .tip {
      flex: 1;
      padding: 10px 16px;
      background: #dbeafe;
      border-radius: 10px;
      font-size: 0.75rem;
      color: #1e40af;
      font-weight: 500;
    }

    .refresh-btn {
      background: #fff;
      color: #1e40af;
      font-size: 0.75rem;
      font-weight: 600;
      border: 1.5px solid #bfdbfe;
      border-radius: 20px;
      padding: 8px 14px;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s, border-color 0.15s;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .refresh-btn:hover { background: #eff6ff; border-color: #93c5fd; }
    .refresh-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ── Form ── */
    .form-wrap {
      width: 100%;
      max-width: 480px;
      padding: 10px 14px 0;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .row {
      display: flex;
      align-items: center;
      background: #fff;
      border: 1.5px solid #e2e8f0;
      border-radius: 13px;
      overflow: hidden;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    .row:focus-within {
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59,130,246,0.1);
    }

    .row.has-name {
      border-color: #bbf7d0;
      background: #f0fdf4;
    }

    .row.has-name:focus-within {
      border-color: #4ade80;
      box-shadow: 0 0 0 3px rgba(74,222,128,0.12);
    }

    .num-col {
      width: 54px;
      min-width: 54px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.25rem;
      font-weight: 800;
      color: #1e40af;
      background: #eff6ff;
      border-right: 1.5px solid #e2e8f0;
    }

    .row.has-name .num-col {
      background: #dcfce7;
      border-right-color: #bbf7d0;
      color: #15803d;
    }

    input[type="text"] {
      flex: 1;
      border: none;
      outline: none;
      background: transparent;
      color: #0f172a;
      font-size: 0.92rem;
      font-weight: 600;
      padding: 0 10px;
      height: 56px;
      font-family: inherit;
      min-width: 0;
    }

    input[type="text"]::placeholder {
      color: #94a3b8;
      font-weight: 400;
    }

    .divider-v {
      width: 1px;
      height: 32px;
      background: #e2e8f0;
      flex-shrink: 0;
    }

    .row.has-name .divider-v { background: #bbf7d0; }

    .code-input {
      width: 80px;
      min-width: 80px;
      border: none;
      outline: none;
      background: transparent;
      color: #1e40af;
      font-size: 0.88rem;
      font-weight: 700;
      padding: 0 8px;
      height: 56px;
      font-family: inherit;
      text-align: center;
      letter-spacing: 1px;
    }

    .code-input::placeholder {
      color: #94a3b8;
      font-weight: 500;
      letter-spacing: 0;
      font-size: 0.78rem;
    }

    .clear-btn {
      background: none;
      border: none;
      color: #e2e8f0;
      font-size: 0.8rem;
      padding: 0 14px;
      cursor: pointer;
      height: 56px;
      transition: color 0.15s;
      flex-shrink: 0;
    }

    .row.has-name .clear-btn { color: #86efac; }
    .clear-btn:hover { color: #f87171 !important; }

    /* ── Fixed bottom save bar ── */
    .bottom-bar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: #fff;
      border-top: 1.5px solid #e2e8f0;
      padding: 10px 16px 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      z-index: 100;
      box-shadow: 0 -4px 20px rgba(0,0,0,0.07);
      max-width: 100%;
    }

    .save-btn {
      flex: 1;
      max-width: 360px;
      background: linear-gradient(135deg, #1e40af 0%, #3b82f6 100%);
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 0.92rem;
      font-weight: 700;
      padding: 12px 16px;
      cursor: pointer;
      font-family: inherit;
      letter-spacing: 0.2px;
      transition: opacity 0.15s, transform 0.1s;
      box-shadow: 0 4px 14px rgba(30,64,175,0.3);
      white-space: nowrap;
    }

    .save-btn:hover { opacity: 0.9; }
    .save-btn:active { transform: scale(0.98); }

    .clear-all-btn {
      font-size: 0.73rem;
      font-weight: 600;
      color: #ef4444;
      background: #fef2f2;
      border: 1.5px solid #fecaca;
      border-radius: 12px;
      padding: 11px 14px;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s;
      white-space: nowrap;
    }

    .clear-all-btn:hover { background: #fee2e2; }

    /* ── Loader ── */
    .loader {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      padding: 40px 0;
      color: #94a3b8;
      font-size: 0.82rem;
      font-weight: 500;
    }

    .spinner {
      width: 28px;
      height: 28px;
      border: 3px solid #e2e8f0;
      border-top-color: #3b82f6;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Toast ── */
    .toast {
      position: fixed;
      top: 68px;
      left: 50%;
      transform: translateX(-50%) translateY(-10px);
      background: #15803d;
      color: #fff;
      font-size: 0.82rem;
      font-weight: 600;
      padding: 10px 20px;
      border-radius: 20px;
      white-space: nowrap;
      box-shadow: 0 4px 16px rgba(0,0,0,0.15);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s, transform 0.2s;
      z-index: 200;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
  </style>
</head>
<body>

  <!-- Password Screen -->
  <div id="passwordScreen" style="display:none;position:fixed;inset:0;background:#f1f5f9;z-index:999;align-items:center;justify-content:center;padding:24px;">
    <div style="background:#fff;border-radius:20px;padding:36px 28px;box-shadow:0 4px 24px rgba(0,0,0,0.08);width:100%;max-width:340px;text-align:center;">
      <div style="font-size:2rem;margin-bottom:12px;">🔒</div>
      <div style="font-size:1.1rem;font-weight:700;color:#0f172a;margin-bottom:4px;">Staff Access</div>
      <div style="font-size:0.82rem;color:#94a3b8;margin-bottom:24px;">Enter password to continue</div>
      <input id="passwordInput" type="password" placeholder="Password" onkeydown="handleKeydown(event)"
        style="width:100%;border:1.5px solid #e2e8f0;border-radius:12px;padding:12px 16px;font-size:1rem;font-family:inherit;outline:none;color:#0f172a;margin-bottom:10px;" />
      <div id="passwordError" style="display:none;color:#ef4444;font-size:0.78rem;margin-bottom:10px;font-weight:500;">Incorrect password. Try again.</div>
      <button onclick="submitPassword()"
        style="width:100%;background:linear-gradient(135deg,#1e40af,#3b82f6);color:#fff;border:none;border-radius:12px;padding:13px;font-size:0.95rem;font-weight:700;font-family:inherit;cursor:pointer;">
        Unlock
      </button>
    </div>
  </div>

  <!-- Admin Content -->
  <div id="adminContent" style="display:contents;">

  <!-- Fixed top bar -->
  <div class="topbar">
    <div class="topbar-left">
      <div class="topbar-title">Update Guest Names</div>
      <div class="topbar-date" id="todayDate"></div>
    </div>
    <a class="back-btn" href="index.html">← Directory</a>
  </div>

  <!-- Tip + Refresh row -->
  <div class="tip-row">
    <div class="tip">💡 Type a name to mark occupied · Leave blank for vacant</div>
    <button class="refresh-btn" onclick="reloadForm()" id="refreshBtn">↻ Reload</button>
  </div>

  <!-- Form -->
  <div class="form-wrap" id="formWrap">
    <div id="loader" class="loader">
      <div class="spinner"></div>
      Loading current data…
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast">✓ Directory updated!</div>

  <!-- Fixed bottom save bar -->
  <div class="bottom-bar">
    <button class="save-btn" onclick="saveNames()">Save &amp; Update Directory</button>
    <button class="clear-all-btn" onclick="clearAll()">Clear all</button>
  </div>

  <script>
    const CORRECT_PASSWORD = 'Steve0987';

    function checkPassword() {
      if (sessionStorage.getItem('admin_auth') === CORRECT_PASSWORD) return;
      document.getElementById('adminContent').style.display = 'none';
      document.getElementById('passwordScreen').style.display = 'flex';
    }

    function submitPassword() {
      const val = document.getElementById('passwordInput').value;
      if (val === CORRECT_PASSWORD) {
        sessionStorage.setItem('admin_auth', CORRECT_PASSWORD);
        document.getElementById('passwordScreen').style.display = 'none';
        document.getElementById('adminContent').style.display = 'contents';
      } else {
        document.getElementById('passwordError').style.display = 'block';
        document.getElementById('passwordInput').value = '';
        document.getElementById('passwordInput').focus();
      }
    }

    function handleKeydown(e) {
      if (e.key === 'Enter') submitPassword();
    }

    checkPassword();

    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbytmNDqZKGEVv8htjH_qv5XHg1WIf9CDwnBc9pKwcy5qrMV-6WRt4O3zODs2p8wV-ZC/exec';

    const today = new Date();
    document.getElementById('todayDate').textContent = today.toLocaleDateString('en-US', {
      weekday: 'long', month: 'short', day: 'numeric'
    });

    const wrap = document.getElementById('formWrap');

    function buildForm(names) {
      wrap.innerHTML = '';
      names.forEach(function(entry) {

        const hasName = entry.name && entry.name.trim() !== '';
        const row = document.createElement('div');
        row.className = 'row' + (hasName ? ' has-name' : '');
        row.id = 'row' + entry.room;
        const nameVal = String(entry.name || '').replace(/"/g, '&quot;');
        row.innerHTML =
          '<div class="num-col">' + entry.room + '</div>' +
          '<input type="text" id="room' + entry.room + '" placeholder="Guest name..." ' +
            'value="' + nameVal + '" autocomplete="off" ' +
            'oninput="updateRow(' + entry.room + ')" />' +
          '<button class="clear-btn" onclick="clearRoom(' + entry.room + ')" title="Clear">✕</button>';
        wrap.appendChild(row);
      });
    }

    // Load current data from Apps Script into the form
    fetch(SCRIPT_URL + '?t=' + Date.now(), { redirect: 'follow' })
      .then(function(res) { return res.text(); })
      .then(function(text) {
        var data = JSON.parse(text);
        buildForm(data.rooms && data.rooms.length ? data.rooms : Array.from({ length: 10 }, function(_, i) { return { room: i + 1, name: '', code: '' }; }));
      })
      .catch(function(err) {
        console.error('Load error:', err);
        buildForm(Array.from({ length: 10 }, function(_, i) { return { room: i + 1, name: '', code: '' }; }));
      });

    function reloadForm() {
      const btn = document.getElementById('refreshBtn');
      btn.disabled = true;
      btn.textContent = '↻ Loading…';
      wrap.innerHTML = '<div class="loader"><div class="spinner"></div>Loading current data…</div>';
      fetch(SCRIPT_URL + '?t=' + Date.now(), { redirect: 'follow' })
        .then(function(res) { return res.text(); })
        .then(function(text) {
          var data = JSON.parse(text);
          buildForm(data.rooms && data.rooms.length ? data.rooms : Array.from({ length: 10 }, function(_, i) { return { room: i + 1, name: '', code: '' }; }));
        })
        .catch(function() {
          buildForm(Array.from({ length: 10 }, function(_, i) { return { room: i + 1, name: '', code: '' }; }));
        })
        .finally(function() {
          btn.disabled = false;
          btn.textContent = '↻ Reload';
        });
    }

    function updateRow(n) {
      const val = document.getElementById('room' + n).value.trim();
      const row = document.getElementById('row' + n);
      if (val) row.classList.add('has-name');
      else row.classList.remove('has-name');
    }

    function clearRoom(n) {
      document.getElementById('room' + n).value = '';
      updateRow(n);
    }

    function clearAll() {
      for (let i = 1; i <= 10; i++) {
        document.getElementById('room' + i).value = '';
        updateRow(i);
      }
    }

    function saveNames() {
      const updated = Array.from({ length: 10 }, function(_, i) {
        const n = i + 1;
        return {
          room: n,
          name: document.getElementById('room' + n).value.trim()
        };
      });

      const toast = document.getElementById('toast');
      const btn = document.querySelector('.save-btn');
      btn.disabled = true;
      btn.textContent = 'Saving…';

      fetch(SCRIPT_URL, {
        method: 'POST',
        body: JSON.stringify(updated)
      })
      .then(function() {
        toast.textContent = '✓ Directory updated!';
        toast.style.background = '#15803d';
        toast.classList.add('show');
      })
      .catch(function() {
        toast.textContent = '⚠️ Failed — check your connection';
        toast.style.background = '#b45309';
        toast.classList.add('show');
      })
      .finally(function() {
        btn.disabled = false;
        btn.textContent = 'Save & Update Directory';
        setTimeout(function() { toast.classList.remove('show'); }, 3000);
      });
    }
  </script>
  </div><!-- end adminContent -->
</body>
</html>
