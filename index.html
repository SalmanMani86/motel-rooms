<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Room Directory</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Georgia, 'Times New Roman', serif;
      background: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 24px;
    }

    .instructions {
      font-size: 1.15rem;
      line-height: 1.7;
      color: #111;
      margin-bottom: 36px;
      max-width: 600px;
    }

    .room-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px 40px;
      width: 100%;
      max-width: 640px;
    }

    .room-link {
      font-size: 1.1rem;
      color: #111;
      text-decoration: none;
      text-align: left;
      padding: 6px 0;
      border-bottom: 1px solid transparent;
      transition: color 0.15s;
      white-space: nowrap;
    }

    .room-link:hover {
      color: #1d4ed8;
      text-decoration: underline;
    }

    .room-link .vacant {
      color: #999;
    }

    .updated {
      margin-top: 32px;
      font-size: 0.72rem;
      color: #bbb;
    }

    .staff-link {
      margin-top: 10px;
      font-size: 0.72rem;
      color: #ccc;
      text-decoration: none;
    }

    .staff-link:hover { color: #999; }
  </style>
</head>
<body>

  <p class="instructions">
    Your room key is in a lock box next to the door.<br>
    Tap your name to access the code for the lockbox
  </p>

  <div class="room-grid" id="roomGrid"></div>

  <p class="updated" id="lastUpdated"></p>
  <a class="staff-link" href="admin.html">Staff Update</a>

  <script>
    const SHEET_CSV_URL = ''; // paste Google Sheet CSV URL here when ready

    function renderRooms(names) {
      const grid = document.getElementById('roomGrid');
      grid.innerHTML = '';

      // left column: rooms 1-5, right column: rooms 6-10
      const left  = names.slice(0, 5);
      const right = names.slice(5, 10);
      const cols  = [left, right];

      cols.forEach(function(col) {
        const colDiv = document.createElement('div');
        col.forEach(function(entry) {
          const name = entry.name ? entry.name.trim() : '';
          const a = document.createElement('a');
          a.href = 'room.html?r=' + entry.room;
          a.className = 'room-link';
          a.innerHTML = 'Room #' + entry.room + ' ' +
            (name ? name : '<span class="vacant">&lt;guest name&gt;</span>');
          colDiv.appendChild(a);
        });
        grid.appendChild(colDiv);
      });

      const saved = localStorage.getItem('motel_updated');
      if (saved) {
        document.getElementById('lastUpdated').textContent = 'Last updated ' + saved;
      }
    }

    async function loadFromSheets() {
      try {
        const res = await fetch(SHEET_CSV_URL);
        const text = await res.text();
        const lines = text.trim().split('\n').slice(1);
        const names = Array.from({ length: 10 }, function(_, i) {
          const n = i + 1;
          const line = lines.find(function(l) { return parseInt(l.split(',')[0]) === n; });
          const name = line ? (line.split(',')[1] || '').trim().replace(/^"|"$/g, '') : '';
          return { room: n, name: name };
        });
        renderRooms(names);
      } catch(e) {
        loadFromLocal();
      }
    }

    function loadFromLocal() {
      const stored = localStorage.getItem('motel_names');
      const defaults = Array.from({ length: 10 }, function(_, i) {
        return { room: i + 1, name: '' };
      });
      renderRooms(stored ? JSON.parse(stored) : defaults);
    }

    if (SHEET_CSV_URL) {
      loadFromSheets();
    } else {
      loadFromLocal();
    }
  </script>
</body>
</html>
