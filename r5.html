<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Room 5 — Lucia Lodge</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #f1f5f9;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
    }
    .card {
      background: #fff;
      border: 1.5px solid #e2e8f0;
      border-radius: 20px;
      padding: 36px 28px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.07);
      max-width: 320px;
      width: 100%;
    }
    .hotel-icon {
      font-size: 2.5rem;
      margin-bottom: 8px;
    }
    .welcome-text {
      font-size: 0.85rem;
      color: #64748b;
      font-weight: 500;
      margin-bottom: 16px;
    }
    .room-box {
      background: #eff6ff;
      border: 1.5px solid #dbeafe;
      border-radius: 14px;
      padding: 14px;
      margin-bottom: 14px;
    }
    .room-box-label {
      font-size: 0.65rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #94a3b8;
      margin-bottom: 4px;
    }
    .highlight {
      font-size: 2.8rem;
      font-weight: 800;
      color: #1e40af;
      line-height: 1;
    }
    .code-box {
      background: linear-gradient(135deg, #1e40af 0%, #3b82f6 100%);
      border-radius: 14px;
      padding: 18px;
    }
    .code-box-label {
      font-size: 0.65rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: rgba(255,255,255,0.7);
      margin-bottom: 8px;
    }
    .code {
      font-size: 2.2rem;
      font-weight: 800;
      color: #fff;
      letter-spacing: 6px;
    }
    .code-hint {
      font-size: 0.7rem;
      color: rgba(255,255,255,0.65);
      margin-top: 6px;
    }
    .welcome {
      display: none;
    }
    .back-link {
      display: inline-block;
      margin-top: 32px;
      font-size: 0.78rem;
      color: #475569;
      text-decoration: none;
      border: 1.5px solid #e2e8f0;
      border-radius: 20px;
      padding: 8px 20px;
      background: #fff;
      font-weight: 600;
      transition: border-color 0.15s, color 0.15s;
    }
    .back-link:hover { color: #1e40af; border-color: #93c5fd; }
    .spinner {
      width: 28px;
      height: 28px;
      border: 3px solid #e2e8f0;
      border-top-color: #3b82f6;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto 10px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading { font-size: 0.82rem; color: #94a3b8; }
  </style>
</head>
<body>
  <div>
    <div class="card">
      <div class="hotel-icon">🏨</div>
      <div class="welcome-text" id="guestName">Welcome to Lucia Lodge</div>
      <div class="room-box">
        <div class="room-box-label">🛏 Room Number</div>
        <div class="highlight" id="roomNum">5</div>
      </div>
      <div class="code-box" id="codeBox">
        <div class="spinner"></div>
        <div class="loading">Loading…</div>
      </div>
    </div>
    
  </div>
  <script src="codes.js"></script>
  <script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbytmNDqZKGEVv8htjH_qv5XHg1WIf9CDwnBc9pKwcy5qrMV-6WRt4O3zODs2p8wV-ZC/exec';
    const ROOM = 5;
    const code = (LOCKBOX_CODES[ROOM] || '').trim();

    // Show code immediately from codes.js
    document.getElementById('codeBox').innerHTML =
      '<div class="code-box-label">🔑 Lock Box Code</div>' +
      '<div class="code">' + (code || '—') + '</div>' +
      '<div class="code-hint">Enter this code on the lockbox</div>';

    // Fetch guest name from sheet
    fetch(SCRIPT_URL + '?t=' + Date.now(), { redirect: 'follow' })
      .then(function(res) { return res.text(); })
      .then(function(text) {
        const data = JSON.parse(text);
        const entry = (data.rooms || []).find(function(r) { return r.room === ROOM; }) || {};
        const name = entry.name ? String(entry.name).trim() : '';
        if (name) document.getElementById('guestName').textContent = 'Welcome, ' + name + '!';
      })
      .catch(function() {});
  </script>
</body>
</html>
