<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Room Access</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #f1f5f9;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
    }

    .card {
      background: #fff;
      border: 1.5px solid #e2e8f0;
      border-radius: 20px;
      padding: 36px 32px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.07);
      max-width: 320px;
      width: 100%;
    }

    .room-label {
      font-size: 0.72rem;
      font-weight: 700;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin-bottom: 4px;
    }

    .room-number {
      font-size: 5rem;
      font-weight: 800;
      color: #1e40af;
      line-height: 1;
      margin-bottom: 8px;
    }

    .guest-name {
      font-size: 1rem;
      font-weight: 700;
      color: #0f172a;
      margin-bottom: 20px;
    }

    .divider {
      width: 40px;
      height: 3px;
      background: #3b82f6;
      border-radius: 2px;
      margin: 0 auto 20px;
    }

    .lockbox-label {
      font-size: 0.72rem;
      font-weight: 700;
      color: #1e40af;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 8px;
    }

    .lockbox-instruction {
      font-size: 0.85rem;
      color: #475569;
      font-weight: 500;
      line-height: 1.5;
      margin-bottom: 16px;
    }

    .code-display {
      background: linear-gradient(135deg, #1e40af 0%, #3b82f6 100%);
      border-radius: 14px;
      padding: 20px;
    }

    .code-value {
      font-size: 2.6rem;
      font-weight: 800;
      color: #fff;
      letter-spacing: 8px;
      word-break: break-all;
      line-height: 1.2;
    }

    .code-hint {
      font-size: 0.72rem;
      color: rgba(255,255,255,0.75);
      margin-top: 6px;
    }

    .no-code {
      background: #fef3c7;
      border: 1.5px solid #fde68a;
      border-radius: 14px;
      padding: 16px;
      font-size: 0.85rem;
      font-weight: 600;
      color: #92400e;
    }

    .back-link {
      display: inline-block;
      margin-top: 28px;
      font-size: 0.78rem;
      color: #475569;
      text-decoration: none;
      border: 1.5px solid #e2e8f0;
      border-radius: 20px;
      padding: 8px 20px;
      background: #fff;
      font-weight: 600;
      transition: border-color 0.15s, color 0.15s;
    }

    .back-link:hover { color: #1e40af; border-color: #93c5fd; }

    .spinner {
      width: 28px;
      height: 28px;
      border: 3px solid #e2e8f0;
      border-top-color: #3b82f6;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto 10px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .loading-text {
      font-size: 0.82rem;
      color: #94a3b8;
      font-weight: 500;
    }
  </style>
</head>
<body>

  <div class="card">
    <div class="room-label">Room</div>
    <div class="room-number" id="roomNum">—</div>
    <div class="guest-name" id="guestName"></div>
    <div class="divider"></div>
    <div class="lockbox-label">🔑 Lockbox Code</div>
    <div class="lockbox-instruction">Your key is in the lock box next to the door.</div>
    <div id="codeBox">
      <div class="spinner"></div>
      <div class="loading-text">Loading…</div>
    </div>
  </div>

  <a class="back-link" href="index.html">← Back to Directory</a>

  <script>
    const SHEET_URL = 'https://script.google.com/macros/s/AKfycbytmNDqZKGEVv8htjH_qv5XHg1WIf9CDwnBc9pKwcy5qrMV-6WRt4O3zODs2p8wV-ZC/exec';

    const params = new URLSearchParams(window.location.search);
    const roomNum = parseInt(params.get('r'));

    if (!roomNum || roomNum < 1 || roomNum > 10) {
      document.getElementById('roomNum').textContent = '?';
      document.querySelector('.lockbox-label').style.display = 'none';
      document.querySelector('.lockbox-instruction').style.display = 'none';
      document.getElementById('codeBox').innerHTML = '<div class="no-code">⚠️ Invalid room number.</div>';
    } else {
      document.title = 'Room ' + roomNum;
      document.getElementById('roomNum').textContent = roomNum;

      function renderEntry(entry) {
        const name = entry && entry.name ? String(entry.name).trim() : '';
        const code = entry && entry.code ? String(entry.code).trim() : '';
        if (name) {
          document.getElementById('guestName').textContent = 'Welcome, ' + name;
        }
        if (code) {
          const fontSize = code.length <= 6 ? '2.6rem' : code.length <= 8 ? '2rem' : '1.4rem';
          const spacing = code.length <= 6 ? '8px' : '4px';
          document.getElementById('codeBox').innerHTML =
            '<div class="code-display"><div class="code-value" style="font-size:' + fontSize + ';letter-spacing:' + spacing + '">' + code + '</div><div class="code-hint">Enter this code on the lockbox</div></div>';
        } else {
          document.getElementById('codeBox').innerHTML =
            '<div class="no-code">⚠️ Code not set yet — please see front desk.</div>';
        }
      }

      fetch(SHEET_URL + '?t=' + Date.now(), { redirect: 'follow' })
        .then(function(res) { return res.text(); })
        .then(function(text) {
          const data = JSON.parse(text);
          const rooms = data.rooms || [];
          const entry = rooms.find(function(r) { return r.room === roomNum; }) || {};
          renderEntry(entry);
        })
        .catch(function() {
          document.getElementById('codeBox').innerHTML =
            '<div class="no-code">⚠️ Could not load — please see front desk.</div>';
        });
    }
  </script>
</body>
</html>
