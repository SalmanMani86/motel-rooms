<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Room Access</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #f1f5f9;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
    }

    .card {
      background: #fff;
      border: 1.5px solid #e2e8f0;
      border-radius: 20px;
      padding: 36px 32px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.07);
      max-width: 320px;
      width: 100%;
    }

    .room-label {
      font-size: 0.72rem;
      font-weight: 700;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin-bottom: 4px;
    }

    .room-number {
      font-size: 4rem;
      font-weight: 800;
      color: #1e40af;
      line-height: 1;
      margin-bottom: 6px;
    }

    .guest-name {
      font-size: 1rem;
      font-weight: 600;
      color: #475569;
      margin-bottom: 24px;
    }

    .divider {
      width: 40px;
      height: 3px;
      background: #e2e8f0;
      border-radius: 2px;
      margin: 0 auto 24px;
    }

    .lockbox-label {
      font-size: 0.72rem;
      font-weight: 700;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 10px;
    }

    .lockbox-instruction {
      font-size: 0.88rem;
      color: #64748b;
      line-height: 1.6;
      margin-bottom: 16px;
    }

    .code-box {
      background: #f8fafc;
      border: 2px dashed #cbd5e1;
      border-radius: 12px;
      padding: 18px;
      font-size: 0.8rem;
      color: #94a3b8;
      font-style: italic;
    }

    .back-link {
      display: inline-block;
      margin-top: 28px;
      font-size: 0.78rem;
      color: #94a3b8;
      text-decoration: none;
      border: 1.5px solid #e2e8f0;
      border-radius: 20px;
      padding: 8px 20px;
      background: #fff;
      transition: border-color 0.15s, color 0.15s;
    }

    .back-link:hover {
      color: #1e40af;
      border-color: #93c5fd;
    }
  </style>
</head>
<body>

  <div class="card">
    <div class="room-label">Room</div>
    <div class="room-number" id="roomNum">—</div>
    <div class="guest-name" id="guestName"></div>
    <div class="divider"></div>
    <div class="lockbox-label">Lockbox Code</div>
    <div class="lockbox-instruction">Your room key is in the lock box next to the door.</div>
    <div class="code-box" id="codeBox">
      Code will be placed here by staff
    </div>
  </div>

  <a class="back-link" href="index.html">← Back to Directory</a>

  <script>
    const params = new URLSearchParams(window.location.search);
    const roomNum = parseInt(params.get('r'));

    if (!roomNum || roomNum < 1 || roomNum > 10) {
      document.getElementById('roomNum').textContent = '?';
    } else {
      document.title = 'Room ' + roomNum;
      document.getElementById('roomNum').textContent = roomNum;

      const stored = localStorage.getItem('motel_names');
      const names = stored ? JSON.parse(stored) : [];
      const entry = names.find(function(n) { return n.room === roomNum; });
      const name = entry && entry.name ? entry.name.trim() : '';
      if (name) {
        document.getElementById('guestName').textContent = 'Welcome, ' + name;
      }
    }
  </script>
</body>
</html>
